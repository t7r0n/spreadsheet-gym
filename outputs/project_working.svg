<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-label="Spreadsheet Gym visual evidence dashboard">
  <defs>
    <style>
      .bg { fill:#f7f8fb; }
      .panel { fill:#ffffff; stroke:#d8e1ec; stroke-width:1.1; }
      .card { fill:#ffffff; stroke:#d8e1ec; stroke-width:1.1; }
      .actioncard { fill:#fbfdff; stroke:#d8e1ec; stroke-width:1.1; }
      .title { font:760 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#111827; }
      .sub { font:420 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#475569; }
      .label { font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#1f2937; }
      .caption { font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#64748b; }
      .small { font:650 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#64748b; }
      .metric { font:780 29px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#0f172a; }
      .rank { font:760 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#2563eb; }
      .cardtext { font:650 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#142033; }
      .mono { font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace; fill:#334155; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="700"/>
  <rect class="panel" x="28" y="28" width="1064" height="644" rx="8"/>
  <text class="title" x="64" y="76">Spreadsheet Gym</text>
  <text class="sub" x="64" y="108"><tspan x="64" dy="0">An RLVR graded, deterministic Excel and PowerPoint sandbox in which a banker agent</tspan><tspan x="64" dy="22">must rebuild a real LBO model and pass 47 unit tests - the missing financial services</tspan></text>
  <rect class="card" x="64" y="166" width="232" height="84" rx="8"/>
  <text class="small" x="84" y="194">pressure index</text>
  <text class="metric" x="84" y="230">0.3167</text>
  <rect class="card" x="320" y="166" width="232" height="84" rx="8"/>
  <text class="small" x="340" y="194">evidence density</text>
  <text class="metric" x="340" y="230">18.5</text>
  <rect class="card" x="576" y="166" width="480" height="84" rx="8"/>
  <text class="small" x="596" y="194">highest leverage path</text>
  <text class="label" x="596" y="224"><tspan x="596" dy="0">evidence replay</tspan></text>
  <rect class="card" x="64" y="292" width="492" height="338" rx="8"/>
  <text class="label" x="92" y="322">runtime probes with evidence</text>
  <text x="92" y="354" class="label">evidence coverage</text><text x="460" y="354" class="mono">ev_0000</text><rect x="92" y="366" width="396" height="14" rx="7" fill="#e5e7eb"/><rect x="92" y="366" width="378" height="14" rx="7" fill="#2563eb"/><text x="92" y="406" class="caption">evidence replay</text><text x="92" y="422" class="label">handoff risk</text><text x="460" y="422" class="mono">ev_0011</text><rect x="92" y="434" width="396" height="14" rx="7" fill="#e5e7eb"/><rect x="92" y="434" width="375" height="14" rx="7" fill="#0891b2"/><text x="92" y="474" class="caption">review operator packet</text><text x="92" y="490" class="label">claim precision</text><text x="460" y="490" class="mono">ev_0110</text><rect x="92" y="502" width="396" height="14" rx="7" fill="#e5e7eb"/><rect x="92" y="502" width="373" height="14" rx="7" fill="#7c3aed"/><text x="92" y="542" class="caption">claim regression harness</text><text x="92" y="558" class="label">review latency</text><text x="460" y="558" class="mono">ev_0121</text><rect x="92" y="570" width="396" height="14" rx="7" fill="#e5e7eb"/><rect x="92" y="570" width="373" height="14" rx="7" fill="#dc2626"/><text x="92" y="610" class="caption">handoff boundary probe</text>
  <text class="label" x="626" y="324">release gates under attack</text>
  <rect class="actioncard" x="626" y="350" width="212" height="118" rx="8"/><text class="rank" x="644" y="378">gate 1</text><text class="cardtext" x="644" y="406"><tspan x="644" dy="0">block release until</tspan><tspan x="644" dy="17">cited evidence is</tspan><tspan x="644" dy="17">regenerated</tspan></text><text class="mono" x="644" y="452">ev_0000</text><rect class="actioncard" x="864" y="350" width="212" height="118" rx="8"/><text class="rank" x="882" y="378">gate 2</text><text class="cardtext" x="882" y="406"><tspan x="882" dy="0">accept only if decision</tspan><tspan x="882" dy="17">claims cite fixture</tspan><tspan x="882" dy="17">evidence</tspan></text><text class="mono" x="882" y="452">ev_0011</text><rect class="actioncard" x="626" y="494" width="212" height="118" rx="8"/><text class="rank" x="644" y="522">gate 3</text><text class="cardtext" x="644" y="550"><tspan x="644" dy="0">open a regression issue</tspan><tspan x="644" dy="17">with trace and benchmark</tspan><tspan x="644" dy="17">delta</tspan></text><text class="mono" x="644" y="596">ev_0110</text><rect class="actioncard" x="864" y="494" width="212" height="118" rx="8"/><text class="rank" x="882" y="522">gate 4</text><text class="cardtext" x="882" y="550"><tspan x="882" dy="0">route to reviewer with</tspan><tspan x="882" dy="17">evidence packet</tspan></text><text class="mono" x="882" y="596">ev_0121</text>
</svg>
